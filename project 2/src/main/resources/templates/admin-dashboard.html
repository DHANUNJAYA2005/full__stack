<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<form action="/admin/search" method="get">
    <input type="text" name="department" placeholder="Search by Department">
    <button type="submit">Search</button>
</form>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold">Admin Dashboard</a>
        <a href="/events" class="btn btn-light btn-sm">Student View</a>
    </div>
</nav>

<div class="container mt-5">

    <a href="/admin/add" class="btn btn-success mb-3">
        + Add Event
    </a>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.name}"></td>
                        <td th:text="${event.department}"></td>
                        <td th:text="${event.eventDate}"></td>
                        <td th:text="${event.type}"></td>
                        <td>
                            <a th:href="@{/admin/edit/{id}(id=${event.id})}"
                               class="btn btn-warning btn-sm">Edit</a>

                            <a th:href="@{/admin/delete/{id}(id=${event.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure?')">
                               Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
