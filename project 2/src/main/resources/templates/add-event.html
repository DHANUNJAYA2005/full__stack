<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">← Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center text-primary mb-4">Add New Event</h3>

        <form th:action="@{/admin/save}" th:object="${event}" method="post">

            <div class="mb-3">
                <label class="form-label">Event Name</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" th:field="*{department}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Event Date</label>
                <input type="date" class="form-control" th:field="*{eventDate}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Event Type</label>
                <select class="form-select" th:field="*{type}">
                    <option value="Workshop">Workshop</option>
                    <option value="Seminar">Seminar</option>
                    <option value="Technical">Technical</option>
                    <option value="Cultural">Cultural</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Save Event
            </button>

        </form>
    </div>
</div>

</body>
</html>
