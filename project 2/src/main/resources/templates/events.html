<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upcoming Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🎓 Smart Campus</a>
        <div>
            <a href="/admin/dashboard" class="btn btn-light btn-sm">Admin</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Upcoming Events</h2>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card shadow h-100">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${event.name}"></h5>

                    <p>
                        <strong>Department:</strong>
                        <span th:text="${event.department}"></span><br>

                        <strong>Date:</strong>
                        <span th:text="${event.eventDate}"></span><br>

                        <strong>Type:</strong>
                        <span th:text="${event.type}"></span>
                    </p>

                    <a th:href="@{/register/{id}(id=${event.id})}"
                       class="btn btn-success w-100">
                        Register
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 Smart Campus Event Management System
</div>

</body>
</html>
