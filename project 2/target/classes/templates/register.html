<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center text-success mb-4">Event Registration</h3>

        <form th:action="@{/register/save}" th:object="${registration}" method="post">

            <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" class="form-control" th:field="*{studentName}" required>
                <p th:if="${#fields.hasErrors('studentName')}" 
   th:errors="*{studentName}" 
   style="color:red;"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" required>
                <p th:if="${#fields.hasErrors('email')}" 
   th:errors="*{email}" 
   style="color:red;"></p>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Register
            </button>

        </form>
    </div>
</div>

</body>
</html>
